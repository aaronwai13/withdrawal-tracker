<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">撳錢額度 icon</title>
  <desc id="desc">Rounded-square icon with a dark background and the Chinese character 額 centered in a silver-white tone.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2C31"/>
      <stop offset="100%" stop-color="#111115"/>
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D7D9DE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)"/>
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
    font-family="-apple-system, SF Pro Display, SF Pro Text, PingFang HK, PingFang TC, Heiti TC, sans-serif"
    font-size="280" font-weight="700" fill="url(#fg)" filter="url(#shadow)">額</text>
</svg>